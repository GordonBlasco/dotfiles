[env]
TERM = "xterm-256color"

[window]
padding.x = 10
padding.y = 10
decorations = "Buttonless"
opacity = 0.7
blur = true
option_as_alt = "Both"
dimensions = { columns = 120, lines = 30 }
position = { x = 1048, y = 396 }

[font]
normal.family = "JetBrainsMono Nerd Font Mono"

size = 18

[general]
import = [
    "~/.config/alacritty/themes/everforest_dark.toml"
]

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
